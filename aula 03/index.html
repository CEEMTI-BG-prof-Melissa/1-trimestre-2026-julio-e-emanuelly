 <!DOCTYPE html>
<html>
    <head>
            <title> "Prática 02" </title>
    </head>
    <body> 
            <h1> Formulário com Método GET </h1>
        <form action="index.html" method="get"> 
           Login: <input type="text" id="login" name="Login">
           <br>
           Senha: <input type="text" id="Senha" name="Senha">
            <br>
            <input type="submit">
           <br>
        </form>
          <h1> Formulário com Método POST </h1>
        <form action="index.html" method="post"> 
           Login: <input type="text" id="login" name="Login">
           <br>
           Senha: <input type="text" id="Senha" name="Senha">
           <br>
           <input type="submit">
           <br>
        </form> 
    </body>
</html>
